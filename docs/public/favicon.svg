<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#0078d4"/>
  
  <!-- Inner gradient circle -->
  <circle cx="128" cy="128" r="108" fill="url(#gradient)"/>
  
  <!-- Windows-style window icon -->
  <g fill="white">
    <!-- Left pane -->
    <rect x="64" y="76" width="52" height="46" rx="4"/>
    <rect x="64" y="134" width="52" height="46" rx="4"/>
    
    <!-- Right pane -->
    <rect x="140" y="76" width="52" height="46" rx="4"/>
    <rect x="140" y="134" width="52" height="46" rx="4"/>
  </g>
  
  <!-- Magnifying glass overlay -->
  <circle cx="168" cy="168" r="32" fill="#0078d4" stroke="white" stroke-width="6"/>
  <line x1="192" y1="192" x2="216" y2="216" stroke="white" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#106ebe"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
  </defs>
</svg>
