name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DOTNET_NOLOGO: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            src/**/*.csproj
            tests/**/*.csproj
            NuGet.Config

      - name: Extract version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore DigYourWindows.slnx

      - name: Build
        run: dotnet build DigYourWindows.slnx -c Release --no-restore

      - name: Test
        run: dotnet test DigYourWindows.slnx -c Release --no-restore

      - name: Publish (framework-dependent)
        run: |
          dotnet publish src/DigYourWindows.UI/DigYourWindows.UI.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o publish/fdd

      - name: Publish (self-contained)
        run: |
          dotnet publish src/DigYourWindows.UI/DigYourWindows.UI.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -o publish/scd

      - name: Package artifacts
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          Compress-Archive -Path publish/fdd/* -DestinationPath "DigYourWindows_${ver}_win-x64_portable.zip"
          Compress-Archive -Path publish/scd/* -DestinationPath "DigYourWindows_${ver}_win-x64_standalone.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DigYourWindows ${{ steps.version.outputs.TAG }}
          generate_release_notes: true
          files: |
            DigYourWindows_*_win-x64_portable.zip
            DigYourWindows_*_win-x64_standalone.zip
