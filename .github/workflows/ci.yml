name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DOTNET_NOLOGO: 1
      DOTNET_CLI_TELEMETRY_OPTOUT: 1

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            src/**/*.csproj
            tests/**/*.csproj
            NuGet.Config

      - name: Restore
        run: dotnet restore DigYourWindows.slnx

      - name: Build
        run: dotnet build DigYourWindows.slnx -c Release --no-restore

      - name: Test
        run: dotnet test DigYourWindows.slnx -c Release --no-restore
