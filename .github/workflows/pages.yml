name: Deploy Docs

on:
  push:
    branches: [master, main]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Build documentation
        run: npm run docs:build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Optimize build output
        run: |
          # Copy static files from public to dist root
          for f in robots.txt browserconfig.xml opensearch.xml manifest.json; do
            if [ -f "docs/public/$f" ]; then
              cp "docs/public/$f" "docs/.vitepress/dist/$f"
            fi
          done
          
          # Generate 404.html from dist/404/index.html if it exists
          if [ -f "docs/.vitepress/dist/404.html" ]; then
            echo "404 page exists"
          fi
          
          # List build output
          echo "Build output size:"
          du -sh docs/.vitepress/dist/
          
          echo "Build output contents:"
          ls -la docs/.vitepress/dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Verify deployment
        run: |
          SITE_URL="https://lessup.github.io/dig-your-windows/"
          echo "Checking $SITE_URL..."
          
          # Check HTTP status
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Deployment verification failed: HTTP $STATUS"
            exit 1
          fi
          
          # Check for critical content
          if ! curl -s "$SITE_URL" | grep -q "DigYourWindows"; then
            echo "❌ Critical content missing"
            exit 1
          fi
          
          echo "✅ Deployment verified successfully"
